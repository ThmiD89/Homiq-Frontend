<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - HOMIQ</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/payment.css">
</head>
<body>
    <!-- Navbar will be loaded by main.js -->

    <main>
        <div class="payment-container">
            <div class="container">
                <div class="payment-layout">
                    <!-- Left: Payment Summary -->
                    <div class="summary-card">
                        <div class="summary-header">
                            <h3 class="summary-title">Payment Summary</h3>
                            <p class="summary-subtitle">Review your booking details</p>
                        </div>
                        <div class="summary-body">
                            <div class="property-item">
                                <span class="property-name">Property</span>
                                <span class="property-value" id="summaryPropertyName">Loading...</span>
                            </div>
                            <div class="property-item">
                                <span class="property-name">Location</span>
                                <span class="property-value" id="summaryPropertyLocation">Loading...</span>
                            </div>
                            
                            <div class="price-breakdown">
                                <div class="price-row">
                                    <span>Rent (1 month)</span>
                                    <span id="rentAmount">Loading...</span>
                                </div>
                                <div class="price-row">
                                    <span>Service Fee (2%)</span>
                                    <span id="serviceFee">Loading...</span>
                                </div>
                            </div>
                            
                            <div class="total-row">
                                <span>Total Amount</span>
                                <span class="total-amount" id="totalAmount">Loading...</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right: Payment Form -->
                    <div class="payment-card">
                        <div class="payment-header">
                            <h2>Complete Payment</h2>
                            <p>Choose your preferred payment method</p>
                        </div>
                        <div class="payment-body">
                            <!-- Payment Methods -->
                            <div class="payment-methods">
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="bkash" class="method-input">
                                    <div class="method-label">
                                        <span class="method-icon">💰</span>
                                        <span class="method-name">bKash</span>
                                    </div>
                                </label>
                                
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="nagad" class="method-input">
                                    <div class="method-label">
                                        <span class="method-icon">💳</span>
                                        <span class="method-name">Nagad</span>
                                    </div>
                                </label>
                                
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="card" class="method-input">
                                    <div class="method-label">
                                        <span class="method-icon">💎</span>
                                        <span class="method-name">Credit Card</span>
                                    </div>
                                </label>
                                
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="sslcommerz" class="method-input">
                                    <div class="method-label">
                                        <span class="method-icon">🔒</span>
                                        <span class="method-name">SSLCommerz</span>
                                    </div>
                                </label>
                            </div>
                            
                            <!-- Dynamic Payment Details -->
                            <div id="paymentDetails" class="payment-details">
                                <h4 class="details-title">Payment Details</h4>
                                <div id="dynamicDetails">
                                    <!-- Dynamic form fields will load here -->
                                </div>
                            </div>
                            
                            <!-- Action Buttons -->
                            <div class="payment-actions">
                                <button id="confirmPaymentBtn" class="confirm-btn">Confirm Payment</button>
                                <a href="#" id="cancelPaymentBtn" class="cancel-btn">Cancel</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Processing payment...</p>
            </div>
        </div>
        
        <!-- Message Container -->
        <div id="messageContainer" class="message-container"></div>
    </main>

    <!-- Footer will be loaded by main.js -->

    <script src="../js/main.js"></script>
    <script src="../js/payment.js"></script>
</body>
</html>
