<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMIQ - Verify OTP</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">HOM<span>IQ</span></div>
                    <h1 class="auth-title">Verify OTP</h1>
                    <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>
                </div>
                
                <div class="auth-body">
                    <form id="otpForm" class="auth-form">
                        <div class="otp-group">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        </div>
                        
                        <button type="submit" class="btn btn-primary auth-btn">Verify OTP</button>
                        
                        <div class="resend-timer">
                            <span id="resendOTP" class="resend-link">Resend OTP (30s)</span>
                        </div>
                    </form>
                </div>
                
                <div class="auth-footer">
                    <p class="auth-footer-text">
                        <a href="login.html" class="auth-footer-link">Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
