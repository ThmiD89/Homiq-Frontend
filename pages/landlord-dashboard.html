<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Dashboard - HOMIQ</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Navbar will be loaded by main.js -->

    <main>
        <div class="dashboard-container">
            <div class="container">
                <!-- Dashboard Header -->
                <div class="dashboard-header">
                    <div>
                        <h1 class="dashboard-title">Landlord Dashboard</h1>
                        <p class="dashboard-subtitle" id="landlordName">Manage your properties</p>
                    </div>
                    <div class="admin-date" id="currentDateTime"></div>
                </div>

                <!-- Stats Cards -->
                <div class="tenant-stats">
                    <div class="stat-card">
                        <div class="stat-icon">🏠</div>
                        <div class="stat-value" id="totalProperties">0</div>
                        <div class="stat-label">Total Properties</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🟢</div>
                        <div class="stat-value" id="availableProperties">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔴</div>
                        <div class="stat-value" id="bookedProperties">0</div>
                        <div class="stat-label">Booked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-value" id="totalEarnings">0</div>
                        <div class="stat-label">Total Earnings</div>
                    </div>
                </div>

                <!-- My Properties Section -->
                <div class="bookings-section">
                    <div class="action-bar">
                        <h3 class="section-title">🏠 My Properties</h3>
                        <button class="add-property-btn" onclick="showAddPropertyForm()">+ Add New Property</button>
                    </div>
                    
                    <div id="propertiesList" class="properties-grid">
                        <div class="loading-state">Loading your properties...</div>
                    </div>
                </div>

                <!-- Add Property Form (hidden by default) -->
                <div id="addPropertyFormContainer" class="form-container" style="display: none;">
                    <h3 class="section-title" id="formTitle">Add New Property</h3>
                    <form id="propertyForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Property Title *</label>
                                <input type="text" id="propertyTitle" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Location *</label>
                                <input type="text" id="propertyLocation" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Rent (৳/month) *</label>
                                <input type="number" id="rentAmount" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Bedrooms *</label>
                                <input type="number" id="bedrooms" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Bathrooms *</label>
                                <input type="number" id="bathrooms" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Area (sqft) *</label>
                                <input type="text" id="area" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Floor</label>
                                <input type="text" id="floor" class="form-input" placeholder="e.g., 3rd Floor">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Image URL *</label>
                                <input type="url" id="imageUrl" class="form-input" required>
                                <div id="imagePreview" class="image-preview"></div>
                            </div>
                            <div class="form-group form-full">
                                <label class="form-label">Description *</label>
                                <textarea id="description" class="form-textarea" rows="3" required></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <div style="display: flex; gap: var(--spacing-md);">
                                    <label><input type="radio" name="status" value="available" checked> Available</label>
                                    <label><input type="radio" name="status" value="booked"> Booked</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="hideAddPropertyForm()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Property</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="deleteModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h3>Delete Property</h3>
                    <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this property?</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be loaded by main.js -->

    <script src="../js/main.js"></script>
    <script src="../js/landlord-dashboard.js"></script>
</body>
</html>
