<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMIQ - Forgot Password</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">HOM<span>IQ</span></div>
                    <h1 class="auth-title">Forgot Password?</h1>
                    <p class="auth-subtitle">Enter your email to reset your password</p>
                </div>
                
                <div class="auth-body">
                    <form id="forgotForm" class="auth-form">
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="Enter your registered email">
                        </div>
                        
                        <button type="submit" class="btn btn-primary auth-btn">Send Reset OTP</button>
                    </form>
                </div>
                
                <div class="auth-footer">
                    <p class="auth-footer-text">
                        Remember your password? 
                        <a href="login.html" class="auth-footer-link">Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
