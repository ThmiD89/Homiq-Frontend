<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - HOMIQ</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/property-detail.css">
</head>
<body>
    <!-- Navbar will be loaded by main.js -->

    <main>
        <section class="property-detail">
            <div class="container">
                <!-- Back Link -->
                <a href="#" id="backLink" class="back-link">← Back to Listings</a>
                
                <div class="detail-layout">
                    <!-- Left Column: Property Info -->
                    <div class="property-info">
                        <!-- Image Gallery -->
                        <div class="gallery">
                            <div class="main-image">
                                <img id="mainImage" src="" alt="Property">
                            </div>
                            <div id="thumbnailStrip" class="thumbnail-strip">
                                <!-- Thumbnails will be loaded here -->
                            </div>
                        </div>
                        
                        <!-- Property Details -->
                        <h1 id="propertyTitle" class="property-title">Loading...</h1>
                        
                        <div class="property-location">
                            <span>📍</span>
                            <span id="propertyLocation">Loading...</span>
                        </div>
                        
                        <div class="property-price" id="propertyPrice">
                            Loading...
                        </div>
                        
                        <!-- Features Grid -->
                        <div class="features-grid">
                            <div class="feature-item">
                                <span class="feature-icon">🛏️</span>
                                <div class="feature-text" id="featureBedrooms">Loading...</div>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">🚿</span>
                                <div class="feature-text" id="featureBathrooms">Loading...</div>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">📐</span>
                                <div class="feature-text" id="featureArea">Loading...</div>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">🏢</span>
                                <div class="feature-text" id="featureFloor">Loading...</div>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">🔑</span>
                                <div class="feature-text">
                                    <strong id="availabilityBadge" class="badge">Loading...</strong>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Description -->
                        <div class="description-section">
                            <h3 class="description-title">Description</h3>
                            <p id="propertyDescription" class="description-text">Loading...</p>
                        </div>
                    </div>
                    
                    <!-- Right Column: Landlord Card -->
                    <div class="landlord-card">
                        <h3 class="landlord-title">Property Owner</h3>
                        
                        <div class="landlord-info">
                            <div class="landlord-avatar">👨</div>
                            <div class="landlord-details">
                                <h4 id="landlordName">Loading...</h4>
                                <p>Verified Owner</p>
                            </div>
                        </div>
                        
                        <div class="contact-info">
                            <div class="contact-item">
                                <span>📞</span>
                                <span id="landlordPhone">Loading...</span>
                            </div>
                            <div class="contact-item">
                                <span>✉️</span>
                                <span id="landlordEmail">Loading...</span>
                            </div>
                        </div>
                        
                        <div id="actionButtons" class="action-buttons">
                            <button id="bookNowBtn" class="book-btn">Book Now / Pay Rent</button>
                            <button id="contactBtn" class="contact-btn">Contact Landlord</button>
                        </div>
                        
                        <div id="bookedMessage" class="booked-message" style="display: none;">
                            ⚠️ This property is already booked.<br>
                            Please check other available properties.
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be loaded by main.js -->

    <script src="../js/main.js"></script>
    <script src="../js/property-detail.js"></script>
</body>
</html>
