<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMIQ - Login to Your Account</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <!-- Navbar will be loaded by main.js -->

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">HOM<span>IQ</span></div>
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Login to your HOMIQ account</p>
                </div>
                
                <div class="auth-body">
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" autocomplete="email">
                        </div>
                        
<div class="form-group">
    <label for="password" class="form-label">
        Password
        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
    </label>
    <div style="position: relative;">
        <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" style="padding-right: 45px;">
        <button type="button" id="togglePassword" class="password-toggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem;">👁️</button>
    </div>
</div>
                        
                        <button type="submit" class="btn btn-primary auth-btn">Login</button>
                    </form>
                </div>
                
                <div class="auth-footer">
                    <p class="auth-footer-text">
                        Don't have an account? 
                        <a href="register.html" class="auth-footer-link">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be loaded by main.js -->

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
